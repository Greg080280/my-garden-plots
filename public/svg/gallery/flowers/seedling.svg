<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <g fill="none" stroke="#5F6E26" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Soil/ground line -->
    <path d="M 30 140 C 60 138, 140 138, 170 140"/>
    <!-- Soil texture dots -->
    <circle cx="45" cy="143" r="1"/>
    <circle cx="60" cy="145" r="1"/>
    <circle cx="78" cy="143" r="1"/>
    <circle cx="120" cy="145" r="1"/>
    <circle cx="138" cy="143" r="1"/>
    <circle cx="155" cy="145" r="1"/>
    <!-- Pot rim -->
    <path d="M 35 140 L 165 140"/>
    <path d="M 35 145 L 165 145"/>
    <!-- Pot body -->
    <path d="M 40 145 L 55 180 L 145 180 L 160 145"/>
    <!-- Pot decoration -->
    <path d="M 50 165 C 75 167, 125 167, 150 165"/>
    <!-- Sprout 1 (left) - just emerging -->
    <path d="M 70 140 C 70 130, 68 122, 70 118"/>
    <!-- Two cotyledon leaves -->
    <path d="M 70 118 C 60 115, 55 118, 60 125 C 67 125, 72 122, 70 118 Z"/>
    <path d="M 70 118 C 80 115, 85 118, 80 125 C 73 125, 68 122, 70 118 Z"/>
    
    <!-- Sprout 2 (center, taller) -->
    <path d="M 100 140 C 100 125, 100 110, 100 95"/>
    <!-- Cotyledons -->
    <path d="M 100 95 C 88 90, 82 95, 88 102 C 96 102, 102 100, 100 95 Z"/>
    <path d="M 100 95 C 112 90, 118 95, 112 102 C 104 102, 98 100, 100 95 Z"/>
    <!-- Top emerging real leaves -->
    <path d="M 100 95 C 95 88, 95 82, 100 78 C 105 82, 105 88, 100 95"/>
    <path d="M 100 82 L 96 78"/>
    <path d="M 100 82 L 104 78"/>
    
    <!-- Sprout 3 (right) -->
    <path d="M 130 140 C 130 130, 128 122, 130 118"/>
    <!-- Two cotyledon leaves -->
    <path d="M 130 118 C 120 115, 115 118, 120 125 C 127 125, 132 122, 130 118 Z"/>
    <path d="M 130 118 C 140 115, 145 118, 140 125 C 133 125, 128 122, 130 118 Z"/>
  </g>
</svg>